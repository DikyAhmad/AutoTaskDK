<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      min-height: 140px;
      font-family: 'Segoe UI', Inter, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a4a 100%);
      color: #e8e8f0;
      padding: 0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 16px;
      background: linear-gradient(135deg, #6c5ce7, #8b7cf7);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      margin-bottom: 16px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 11px;
      color: #8888aa;
    }

    .content-area {
      padding: 0 16px 16px 16px;
    }

    .status-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #00cec9;
      box-shadow: 0 0 8px rgba(0, 206, 201, 0.4);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: #ff6b6b;
      box-shadow: 0 0 8px rgba(255, 107, 107, 0.4);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-info {
      flex: 1;
    }

    .status-label {
      font-size: 13px;
      font-weight: 600;
    }

    .status-label.connected { color: #00cec9; }
    .status-label.disconnected { color: #ff6b6b; }

    .status-desc {
      font-size: 11px;
      color: #8888aa;
    }

    .btn-reconnect {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #6c5ce7, #8b7cf7);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: 200ms ease;
    }

    .btn-reconnect:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-reconnect:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" class="header-icon" alt="Logo" />
    <div class="header-text">
      <h1>AutoTaskDK</h1>
      <p style="color: rgba(255,255,255,0.7)">Browser Automation</p>
    </div>
  </div>

  <div class="content-area">
    <div class="status-card">
      <div id="status-dot" class="status-dot disconnected"></div>
      <div class="status-info">
        <div id="status-label" class="status-label disconnected">Disconnected</div>
        <div id="status-desc" class="status-desc">Not connected to desktop app</div>
      </div>
    </div>

    <button id="btn-reconnect" class="btn-reconnect">🔄 Reconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
